name: Fetch Exchange Rates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python exchange.py

      - name: Ensure docs folder exists
        run: mkdir -p docs

      - name: Copy CSV to docs
        run: cp exchange_rates.csv docs/exchange_rates.csv

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add exchange_rates.csv docs/exchange_rates.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update exchange rates CSV"

          git pull --rebase origin main
          git push origin HEAD:main
