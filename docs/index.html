<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汇率表</title>
  <style>
    body {
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      background: #f8f8f8;
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
      margin: 0 0 28px;
      font-weight: 700;
    }

    .actions {
      margin-bottom: 28px;
    }

    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 1400px;
      background: white;
      text-align: center;
    }

    th, td {
      border: 1px solid #d9d9d9;
      padding: 18px 16px;
      font-size: 18px;
    }

    th {
      background: #f3f4f6;
      font-size: 20px;
      font-weight: 700;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>汇率表</h1>

    <div class="actions">
      <a class="button" href="exchange_rates.csv" download>下载 CSV</a>
    </div>

    <div class="table-wrap">
      <table id="rates-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadCSV() {
      const response = await fetch('exchange_rates.csv');
      const text = await response.text();

      const rows = text.trim().split('\n').map(row => row.split(','));
      const dataRows = rows.slice(1).reverse();

      const thead = document.querySelector('#rates-table thead');
      const tbody = document.querySelector('#rates-table tbody');

      thead.innerHTML = '';
      tbody.innerHTML = '';

      const chineseHeaders = ['时间', '美元-人民币', '英镑-美元', '欧元-美元'];

      const headerRow = document.createElement('tr');
      chineseHeaders.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);

      dataRows.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(col => {
          const td = document.createElement('td');
          td.textContent = col;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    loadCSV();
  </script>
</body>
</html>
