<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汇率表</title>
  <style>
    body {
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      background: #f8f8f8;
      color: #222;
    }

    .container {
      max-width: 1600px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 24px;
      font-weight: 700;
    }

    .actions {
      margin-bottom: 24px;
    }

    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      display: flex;
      justify-content: center;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 1600px;
      background: white;
      text-align: center;
    }

    th, td {
      border: 1px solid #d9d9d9;
      padding: 16px 14px;
      font-size: 17px;
      white-space: nowrap;
    }

    th {
      background: #f3f4f6;
      font-size: 18px;
      font-weight: 700;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    .error {
      margin-top: 16px;
      color: #b91c1c;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>汇率表</h1>

    <div class="actions">
      <a class="button" href="exchange_rates.csv" download>下载 CSV</a>
    </div>

    <div class="table-wrap">
      <table id="rates-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="error" class="error"></div>
  </div>

  <script>
    async function loadCSV() {
      try {
        const response = await fetch('exchange_rates.csv', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('CSV 加载失败');
        }

        const text = await response.text();
        const rows = text
          .trim()
          .split('\n')
          .map(row => row.split(','))
          .filter(row => row.length >= 6);

        const dataRows = rows.slice(1).reverse();

        const thead = document.querySelector('#rates-table thead');
        const tbody = document.querySelector('#rates-table tbody');

        thead.innerHTML = '';
        tbody.innerHTML = '';

        const chineseHeaders = [
          '时间',
          '美元-人民币',
          '英镑-美元（市场）',
          '欧元-美元（市场）',
          '英镑-美元（PayPal估）',
          '欧元-美元（PayPal估）'
        ];

        const headerRow = document.createElement('tr');
        chineseHeaders.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        dataRows.forEach(row => {
          const tr = document.createElement('tr');
          row.slice(0, 6).forEach(col => {
            const td = document.createElement('td');
            td.textContent = col;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      } catch (err) {
        document.getElementById('error').textContent = '页面加载失败，请稍后刷新重试。';
        console.error(err);
      }
    }

    loadCSV();
  </script>
</body>
</html>
